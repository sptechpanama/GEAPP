substitutions:
  _REGION: us-central1
  _REPOSITORY: geapp
  _IMAGE: finance-docs-worker

steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -f
      - cloudrun/finance_docs_worker.Dockerfile
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE}:latest
      - .
  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE}:latest

images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE}:latest
